<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinemaFlo Admin — Orders</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>CinemaFlo Admin</h1>
  <span style="font-size:12px; color:var(--text-dim)">Token-protected</span>
</header>

<nav class="tabs">
  <a href="index.html">Menu &amp; stock</a>
  <a href="orders.html" class="active">Orders</a>
  <a href="offers.html">Offers</a>
</nav>

<main>
  <div class="card">
    <h3 style="margin-bottom:14px; font-size:15px;">Live orders</h3>
    <table>
      <thead>
        <tr><th>Seat</th><th>Items</th><th>Total</th><th>Status</th><th>Advance</th></tr>
      </thead>
      <tbody id="order-rows"></tbody>
    </table>
  </div>
</main>

<script src="app.js"></script>
<script>
const NEXT_STATUS = {
  placed: 'preparing',
  preparing: 'ready',
  ready: 'delivered',
};

async function loadOrders() {
  const orders = await Admin.req('/admin/orders');
  const rows = orders.map(order => {
    const itemsSummary = order.lines.map(l => `${l.quantity}\u00d7 ${l.item_name}`).join(', ');
    const next = NEXT_STATUS[order.status];
    return `
      <tr>
        <td>${order.seat_number}</td>
        <td style="max-width:280px">${itemsSummary}</td>
        <td>${Admin.formatRupees(order.total_paise)}</td>
        <td><span class="badge ${order.status}">${order.status}</span></td>
        <td>
          ${next
            ? `<button onclick="advance('${order.id}', '${next}')">Mark ${next}</button>`
            : '<span style="color:var(--text-dim); font-size:12px">—</span>'}
        </td>
      </tr>`;
  }).join('');
  document.getElementById('order-rows').innerHTML = rows || '<tr><td colspan="5" class="empty-state">No orders yet</td></tr>';
}

async function advance(orderId, newStatus) {
  await Admin.req(`/admin/orders/${orderId}/status`, {
    method: 'PATCH',
    body: JSON.stringify({ status: newStatus }),
  });
  loadOrders();
}

loadOrders();
setInterval(loadOrders, 5000);
</script>
</body>
</html>
